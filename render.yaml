services:
  - type: web
    name: monolog-backend
    env: node
    region: oregon 
    rootDir: monolog-backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://farhan-works.vercel.app
      - key: NODE_ENV
        value: production
